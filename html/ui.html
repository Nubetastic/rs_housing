<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: transparent;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        #panel {
            position: absolute;
            top: 50%;
            right: 3%;
            transform: translateY(-50%);
            width: 230px;
            display: none;
            animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50%) translateX(30px); }
            to   { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        /* Glass card */
        .card {
            background: linear-gradient(145deg, rgba(10,12,20,0.92), rgba(5,8,18,0.96));
            border: 1px solid rgba(0,200,255,0.18);
            border-radius: 12px;
            padding: 18px 16px 16px;
            box-shadow:
                0 0 0 1px rgba(0,200,255,0.05),
                0 20px 60px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        /* Subtle corner accent */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 60px; height: 60px;
            background: radial-gradient(circle at top left, rgba(0,200,255,0.12), transparent 70%);
            pointer-events: none;
        }
        .card::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 80px; height: 80px;
            background: radial-gradient(circle at bottom right, rgba(0,140,255,0.08), transparent 70%);
            pointer-events: none;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,200,255,0.12);
        }

        .header-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, rgba(0,200,255,0.2), rgba(0,100,255,0.15));
            border: 1px solid rgba(0,200,255,0.3);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .header-icon svg { width: 14px; height: 14px; }

        h3 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #e8f4ff;
        }

        /* Speed section */
        .section-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: rgba(0,200,255,0.6);
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #speedVal {
            color: rgba(0,220,255,0.9);
        }

        .slider-wrap {
            margin-bottom: 14px;
            position: relative;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            position: relative;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c8ff, #0080ff);
            border: 2px solid rgba(0,200,255,0.5);
            box-shadow: 0 0 8px rgba(0,200,255,0.5);
            cursor: pointer;
            transition: box-shadow 0.15s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 14px rgba(0,200,255,0.8);
        }

        /* Divider */
        .divider {
            height: 1px;
            background: rgba(0,200,255,0.08);
            margin: 12px 0;
        }

        /* Button groups */
        .group-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-bottom: 8px;
        }

        button {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 7px 4px;
            background: rgba(255,255,255,0.04);
            color: rgba(220,235,255,0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
            overflow: hidden;
        }
        button:hover {
            background: rgba(0,200,255,0.1);
            border-color: rgba(0,200,255,0.3);
            color: #fff;
            box-shadow: 0 0 10px rgba(0,200,255,0.15);
        }
        button:active {
            transform: scale(0.96);
            background: rgba(0,200,255,0.18);
        }

        /* Confirm / Cancel */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(0,200,255,0.08);
        }

        .btn-confirm {
            background: rgba(0,180,80,0.12) !important;
            border-color: rgba(0,200,80,0.25) !important;
            color: #4dffa0 !important;
        }
        .btn-confirm:hover {
            background: rgba(0,180,80,0.25) !important;
            box-shadow: 0 0 12px rgba(0,200,80,0.25) !important;
        }

        .btn-cancel {
            background: rgba(220,40,40,0.1) !important;
            border-color: rgba(255,60,60,0.2) !important;
            color: #ff7070 !important;
        }
        .btn-cancel:hover {
            background: rgba(220,40,40,0.22) !important;
            box-shadow: 0 0 12px rgba(255,60,60,0.2) !important;
        }

        /* Icon SVGs inline */
        .ico { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>

<div id="panel">
  <div class="card">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(0,200,255,0.9)" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
        </svg>
      </div>
      <h3 id="title"></h3>
    </div>

    <!-- Speed -->
    <div class="section-label">
      <span id="speedLabel"></span>
      <span id="speedVal">0.50</span>
    </div>
    <div class="slider-wrap">
      <input type="range" min="0.01" max="2" step="0.01" value="0.5" id="speed"
             oninput="document.getElementById('speedVal').textContent=parseFloat(this.value).toFixed(2)">
    </div>

    <div class="divider"></div>

    <!-- Position -->
    <div class="group-label" id="positionGroupLabel"></div>
    <div class="btn-grid">
      <button id="forward"  onclick="send('y_plus')">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,1 9,9 1,9" fill="currentColor"/></svg>
        <span id="forwardLabel"></span>
      </button>
      <button id="backward" onclick="send('y_minus')">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,9 1,1 9,1" fill="currentColor"/></svg>
        <span id="backwardLabel"></span>
      </button>
      <button id="left"  onclick="send('x_plus')">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="1,5 9,1 9,9" fill="currentColor"/></svg>
        <span id="leftLabel"></span>
      </button>
      <button id="right" onclick="send('x_minus')">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="9,5 1,1 1,9" fill="currentColor"/></svg>
        <span id="rightLabel"></span>
      </button>
    </div>

    <!-- Elevation -->
    <div class="group-label" id="elevationGroupLabel"></div>
    <div class="btn-grid">
      <button id="up"   onclick="send('z_plus')">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,1 9,9 1,9" fill="currentColor"/></svg>
        <span id="upLabel"></span>
      </button>
      <button id="down" onclick="send('z_minus')">
        <svg width="10" height="10" viewBox="0 0 10 10"><polygon points="5,9 1,1 9,1" fill="currentColor"/></svg>
        <span id="downLabel"></span>
      </button>
    </div>

    <!-- Rotation -->
    <div class="group-label" id="rotationGroupLabel"></div>
    <div class="btn-grid">
      <button id="rotPlus"  onclick="send('rot_plus')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12a9 9 0 1 1-9-9"/><polyline points="16 3 21 3 21 8"/>
        </svg>
        <span id="rotPlusLabel"></span>
      </button>
      <button id="rotMinus" onclick="send('rot_minus')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" transform="scale(-1,1)" style="transform:scaleX(-1)">
          <path d="M21 12a9 9 0 1 1-9-9"/><polyline points="16 3 21 3 21 8"/>
        </svg>
        <span id="rotMinusLabel"></span>
      </button>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="confirm" class="btn-confirm" onclick="send('confirm')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="confirmLabel"></span>
      </button>
      <button id="cancel" class="btn-cancel" onclick="send('cancel')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        <span id="cancelLabel"></span>
      </button>
    </div>

  </div>
</div>

<script>
    function send(action){
        fetch(`https://${GetParentResourceName()}/menuAction`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({
                action: action,
                speed: document.getElementById("speed").value
            })
        });
    }

    window.addEventListener("message", function(e){
        if(e.data.show){
            const panel = document.getElementById("panel");
            panel.style.display = "block";

            if(e.data.lang){
                const l = e.data.lang;
                document.getElementById("title").innerText              = l.title         || "";
                document.getElementById("speedLabel").innerText         = l.speed         || "";
                document.getElementById("positionGroupLabel").innerText = l.positionGroup || "";
                document.getElementById("elevationGroupLabel").innerText= l.elevationGroup|| "";
                document.getElementById("rotationGroupLabel").innerText = l.rotationGroup || "";
                document.getElementById("forwardLabel").innerText       = l.forward       || "";
                document.getElementById("backwardLabel").innerText      = l.backward      || "";
                document.getElementById("leftLabel").innerText          = l.left          || "";
                document.getElementById("rightLabel").innerText         = l.right         || "";
                document.getElementById("upLabel").innerText            = l.up            || "";
                document.getElementById("downLabel").innerText          = l.down          || "";
                document.getElementById("rotPlusLabel").innerText       = l.rotPlus       || "";
                document.getElementById("rotMinusLabel").innerText      = l.rotMinus      || "";
                document.getElementById("confirmLabel").innerText       = l.confirm       || "";
                document.getElementById("cancelLabel").innerText        = l.cancel        || "";
            }
        } else {
            document.getElementById("panel").style.display = "none";
        }
    });
</script>

</body>
</html>
