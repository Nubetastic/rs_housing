<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: transparent;
            color: #e8f4ff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #panel {
            position: absolute;
            top: 50%;
            right: 2%;
            width: 600px;
            height: min(1040px, 96vh);
            transform: translateY(-50%);
            display: none;
            animation: slideIn 0.22s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50%) translateX(60px); }
            to { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        .card {
            width: 100%;
            height: 100%;
            padding: 32px 28px 28px;
            background: linear-gradient(145deg, rgba(10,12,20,0.94), rgba(5,8,18,0.97));
            border: 1px solid rgba(0,200,255,0.18);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at top left, rgba(0,200,255,0.14), transparent 70%);
            pointer-events: none;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 18px;
            min-height: 78px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0,200,255,0.12);
            position: relative;
            z-index: 1;
        }

        .header-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: #67dcff;
            background: linear-gradient(135deg, rgba(0,200,255,0.2), rgba(0,100,255,0.15));
            border: 1px solid rgba(0,200,255,0.3);
            font-size: 28px;
        }

        h3 {
            font-size: 27px;
            font-weight: 700;
            letter-spacing: 0.11em;
            text-transform: uppercase;
        }

        #subtitle {
            min-height: 62px;
            padding: 16px 2px 14px;
            color: rgba(205,225,245,0.6);
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            line-height: 1.45;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        #decorationView,
        #placementView,
        #housingLedgerView,
        #housingPaymentView,
        #housingKeyholdersView {
            min-height: 0;
            flex: 1;
            display: none;
            flex-direction: column;
        }

        #menuItems {
            min-height: 0;
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        #menuItems::-webkit-scrollbar { width: 7px; }
        #menuItems::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        #menuItems::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.3); border-radius: 4px; }

        .menu-item {
            width: 100%;
            min-height: 86px;
            margin-bottom: 10px;
            padding: 15px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.035);
            color: rgba(220,235,255,0.82);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            cursor: pointer;
            transition: 0.14s ease;
        }

        .menu-item.selected {
            color: #fff;
            background: rgba(0,200,255,0.13);
            border-color: rgba(0,200,255,0.42);
            box-shadow: inset 3px 0 0 #22cfff, 0 0 14px rgba(0,200,255,0.1);
        }

        .item-label {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.055em;
            text-transform: uppercase;
        }

        .item-description {
            max-width: 190px;
            color: rgba(103,220,255,0.75);
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            line-height: 1.35;
            text-align: right;
        }

        .empty {
            margin-top: 36px;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            text-transform: uppercase;
        }

        .key-help {
            min-height: 54px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid rgba(0,200,255,0.09);
            color: rgba(255,255,255,0.34);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.04em;
            text-align: center;
            text-transform: uppercase;
        }

        .section-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 13px 0 11px;
            color: rgba(0,200,255,0.62);
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #speedVal { color: rgba(0,220,255,0.95); }

        input[type=range] {
            appearance: none;
            width: 100%;
            height: 6px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.09);
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c8ff, #0080ff);
            border: 2px solid rgba(0,200,255,0.55);
            box-shadow: 0 0 8px rgba(0,200,255,0.5);
        }

        .group-label {
            margin: 13px 0 9px;
            color: rgba(255,255,255,0.3);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.11em;
            text-transform: uppercase;
        }

        .btn-grid,
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 11px;
        }

        button {
            min-height: 58px;
            padding: 12px 9px;
            color: rgba(220,235,255,0.86);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.14s ease;
        }

        button:hover {
            color: #fff;
            background: rgba(0,200,255,0.12);
            border-color: rgba(0,200,255,0.34);
        }

        .actions {
            margin-top: auto;
            padding-top: 18px;
            border-top: 1px solid rgba(0,200,255,0.09);
        }

        .btn-confirm { color: #4dffa0; border-color: rgba(0,200,80,0.26); background: rgba(0,180,80,0.12); }
        .btn-cancel { color: #ff7070; border-color: rgba(255,60,60,0.22); background: rgba(220,40,40,0.1); }

        .property-information {
            display: block;
            min-height: 0;
            overflow-y: auto;
            padding: 5px 18px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            background: rgba(255,255,255,0.035);
        }

        button:disabled {
            opacity: 0.34;
            cursor: not-allowed;
            background: rgba(255,255,255,0.025);
            border-color: rgba(255,255,255,0.06);
        }

        .property-stat {
            min-height: 58px;
            padding: 13px 3px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .property-stat:last-child { border-bottom: 0; }
        .property-stat.danger {
            margin: 0 -10px;
            padding: 13px;
            background: rgba(210,35,35,0.14);
            box-shadow: inset 3px 0 0 #ff5252;
        }

        .stat-label,
        .keyholder-section-title {
            color: rgba(103,220,255,0.72);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .property-stat.danger .stat-label,
        .property-stat.danger .stat-value { color: #ff6868; }

        .sell-information {
            display: none;
            margin-bottom: 14px;
            padding: 5px 18px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            background: rgba(255,255,255,0.035);
        }

        .sale-note {
            margin: 12px -6px;
            padding: 13px 14px;
            border: 1px solid rgba(0,200,255,0.16);
            border-radius: 9px;
            color: rgba(190,230,255,0.82);
            background: rgba(0,150,220,0.07);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            line-height: 1.45;
            text-transform: uppercase;
        }

        .sale-note.danger {
            border-color: rgba(255,70,70,0.34);
            color: #ff7777;
            background: rgba(210,35,35,0.14);
            box-shadow: inset 3px 0 0 #ff5252;
        }

        #decorationView.sell-confirm #menuItems {
            flex: 0 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 11px;
            margin-top: auto;
            padding: 18px 0 0;
            border-top: 1px solid rgba(0,200,255,0.09);
            overflow: visible;
        }

        #decorationView.sell-confirm .menu-item {
            min-height: 62px;
            margin: 0;
            padding: 13px 16px;
            justify-content: center;
            text-align: center;
        }

        #decorationView.sell-confirm .item-description { display: none; }
        #decorationView.sell-confirm .item-label { font-size: 19px; }
        #decorationView.sell-confirm .menu-item[data-value="confirm_sell"] {
            color: #4dffa0;
            border-color: rgba(0,200,80,0.26);
            background: rgba(0,180,80,0.12);
        }

        #decorationView.sell-confirm .menu-item[data-value="cancel_sell"] {
            color: #ff7070;
            border-color: rgba(255,60,60,0.22);
            background: rgba(220,40,40,0.1);
        }

        #decorationView.sell-confirm .menu-item.selected {
            border-color: rgba(103,220,255,0.62);
            box-shadow: inset 3px 0 0 #22cfff, 0 0 14px rgba(0,200,255,0.1);
        }

        .stat-value {
            color: #f4f9ff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 19px;
            text-align: right;
            overflow-wrap: anywhere;
        }

        .ledger-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 11px;
            margin-top: auto;
            padding-top: 18px;
            border-top: 1px solid rgba(0,200,255,0.09);
        }

        .payment-information {
            display: block;
            min-height: 0;
            flex: 1;
            overflow-y: auto;
            padding: 5px 18px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            background: rgba(255,255,255,0.035);
        }

        .payment-information::-webkit-scrollbar { width: 7px; }
        .payment-information::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.3); border-radius: 4px; }

        .amount-entry {
            margin-top: 20px;
            padding: 18px;
            border: 1px solid rgba(0,200,255,0.16);
            border-radius: 12px;
            background: rgba(0,150,220,0.055);
        }

        .amount-entry label {
            display: block;
            margin-bottom: 10px;
            color: rgba(103,220,255,0.72);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.09em;
            text-transform: uppercase;
        }

        .amount-input {
            width: 100%;
            height: 58px;
            padding: 10px 15px;
            color: #f4f9ff;
            background: rgba(0,0,0,0.28);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 9px;
            outline: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 23px;
        }

        .amount-input:focus { border-color: rgba(0,200,255,0.52); }
        .payment-submit { width: 100%; margin-top: 12px; }

        .tax-stepper {
            display: grid;
            grid-template-columns: 58px 1fr 58px;
            gap: 10px;
            align-items: center;
        }

        .tax-stepper button { min-height: 58px; padding: 0; font-size: 29px; }
        .tax-selected-amount {
            height: 58px;
            display: grid;
            place-items: center;
            color: #fff;
            background: rgba(0,0,0,0.28);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 9px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 23px;
        }

        #keyholderLists {
            min-height: 0;
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        #keyholderLists::-webkit-scrollbar { width: 7px; }
        #keyholderLists::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.3); border-radius: 4px; }

        .keyholder-section-title {
            position: sticky;
            top: 0;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            padding: 11px 4px 9px;
            background: rgba(7,10,19,0.97);
        }

        .person-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 14px;
            min-height: 72px;
            margin-bottom: 8px;
            padding: 11px 12px 11px 17px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 11px;
            background: rgba(255,255,255,0.035);
        }

        .person-main { min-width: 0; cursor: pointer; }
        .person-name {
            color: rgba(230,241,255,0.9);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.045em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .person-id {
            margin-top: 4px;
            color: rgba(103,220,255,0.62);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
        }

        .person-action {
            width: 46px;
            min-height: 46px;
            padding: 0;
            border-radius: 50%;
            font-size: 27px;
            line-height: 1;
        }

        .person-action.add { color: #4dffa0; border-color: rgba(0,200,80,0.3); }
        .person-action.remove { color: #ff7070; border-color: rgba(255,60,60,0.3); }
        .section-empty {
            padding: 20px 5px 28px;
            color: rgba(255,255,255,0.32);
            font-family: 'Share Tech Mono', monospace;
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="panel">
        <div class="card">
            <div class="header">
                <div class="header-icon">✦</div>
                <h3 id="title">Decoration Menu</h3>
            </div>
            <div id="subtitle"></div>

            <div id="decorationView">
                <div class="sell-information" id="sellInformation"></div>
                <div id="menuItems"></div>
                <div class="key-help" id="menuKeyHelp">↑ ↓ Navigate &nbsp; Enter Select &nbsp; Backspace Back &nbsp; Esc Exit</div>
            </div>

            <div id="housingLedgerView">
                <div class="property-information" id="propertyInformation"></div>
                <div class="ledger-actions">
                    <button class="btn-confirm" id="ledgerDepositButton"></button>
                    <button id="ledgerWithdrawButton"></button>
                    <button id="ledgerPayTaxButton"></button>
                </div>
                <div class="key-help">Backspace Back &nbsp; Esc Exit</div>
            </div>

            <div id="housingPaymentView">
                <div class="payment-information" id="paymentInformation"></div>
                <div class="amount-entry">
                    <label id="paymentAmountLabel"></label>
                    <div id="normalAmountEntry">
                        <input class="amount-input" id="ledgerAmountInput" type="number" min="1" step="1">
                    </div>
                    <div class="tax-stepper" id="taxAmountStepper">
                        <button id="taxAmountMinus">−</button>
                        <div class="tax-selected-amount" id="taxSelectedAmount">$0</div>
                        <button id="taxAmountPlus">+</button>
                    </div>
                    <button class="btn-confirm payment-submit" id="paymentSubmitButton"></button>
                </div>
                <div class="key-help">Backspace Back &nbsp; Esc Exit</div>
            </div>

            <div id="housingKeyholdersView">
                <div id="keyholderLists"></div>
                <div class="key-help">Select a keyholder name to manage permissions &nbsp; Backspace Back &nbsp; Esc Exit</div>
            </div>

            <div id="placementView">
                <div class="section-label">
                    <span id="speedLabel"></span>
                    <span id="speedVal">0.50</span>
                </div>
                <input type="range" min="0.01" max="2" step="0.01" value="0.5" id="speed">

                <div class="group-label" id="positionGroupLabel"></div>
                <div class="btn-grid">
                    <button onclick="sendPlacement('y_plus')" id="forwardLabel"></button>
                    <button onclick="sendPlacement('y_minus')" id="backwardLabel"></button>
                    <button onclick="sendPlacement('x_plus')" id="leftLabel"></button>
                    <button onclick="sendPlacement('x_minus')" id="rightLabel"></button>
                </div>

                <div class="group-label" id="elevationGroupLabel"></div>
                <div class="btn-grid">
                    <button onclick="sendPlacement('z_plus')" id="upLabel"></button>
                    <button onclick="sendPlacement('z_minus')" id="downLabel"></button>
                </div>

                <div class="group-label" id="rotationGroupLabel"></div>
                <div class="btn-grid">
                    <button onclick="sendPlacement('rot_plus')" id="rotPlusLabel"></button>
                    <button onclick="sendPlacement('rot_minus')" id="rotMinusLabel"></button>
                </div>

                <div class="actions">
                    <button class="btn-confirm" onclick="sendPlacement('confirm')" id="confirmLabel"></button>
                    <button class="btn-cancel" onclick="sendPlacement('cancel')" id="cancelLabel"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const panel = document.getElementById('panel');
        const decorationView = document.getElementById('decorationView');
        const placementView = document.getElementById('placementView');
        const housingLedgerView = document.getElementById('housingLedgerView');
        const housingPaymentView = document.getElementById('housingPaymentView');
        const housingKeyholdersView = document.getElementById('housingKeyholdersView');
        const menuItems = document.getElementById('menuItems');
        const menuKeyHelp = document.getElementById('menuKeyHelp');
        const sellInformation = document.getElementById('sellInformation');
        const propertyInformation = document.getElementById('propertyInformation');
        const paymentInformation = document.getElementById('paymentInformation');
        const keyholderLists = document.getElementById('keyholderLists');
        const speed = document.getElementById('speed');
        const speedVal = document.getElementById('speedVal');

        let mode = null;
        let items = [];
        let selectedIndex = 0;
        let listReorderPaused = false;
        let pendingLiveItems = null;
        let listReorderTimer = null;
        let taxPaymentAmount = 0;

        function post(name, body = {}) {
            return fetch(`https://${GetParentResourceName()}/${name}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json; charset=UTF-8' },
                body: JSON.stringify(body)
            });
        }

        function sendPlacement(action) {
            post('menuAction', { action, speed: speed.value });
        }

        function hideViews() {
            decorationView.style.display = 'none';
            decorationView.classList.remove('sell-confirm');
            placementView.style.display = 'none';
            housingLedgerView.style.display = 'none';
            housingPaymentView.style.display = 'none';
            housingKeyholdersView.style.display = 'none';
            sellInformation.style.display = 'none';
            sellInformation.innerHTML = '';
        }

        function money(value) {
            return `$${Number(value || 0).toLocaleString('en-US')}`;
        }

        function notifySelection() {
            if (!items.length) return;
            if (mode === 'decoration') {
                post('decorationNavigate', { index: selectedIndex + 1 });
            }
        }

        function refreshSelection(notify = true) {
            const selectedKey = items[selectedIndex]
                && String(items[selectedIndex].key ?? selectedIndex);

            menuItems.querySelectorAll('.menu-item').forEach(row => {
                row.classList.toggle('selected', row.dataset.key === selectedKey);
            });

            const selected = selectedKey
                ? Array.from(menuItems.querySelectorAll('.menu-item'))
                    .find(row => row.dataset.key === selectedKey)
                : null;
            if (selected) selected.scrollIntoView({ block: 'nearest' });
            if (notify) notifySelection();
        }

        function createItemRow(item, index) {
            const row = document.createElement('div');
            row.className = 'menu-item';
            row.dataset.key = String(item.key ?? index);
            row.innerHTML = `
                <div class="item-label"></div>
                <div class="item-description"></div>
            `;

            row.addEventListener('mouseenter', () => {
                const currentIndex = items.findIndex((entry, entryIndex) =>
                    String(entry.key ?? entryIndex) === row.dataset.key);
                if (currentIndex >= 0) setSelected(currentIndex);
            });

            row.addEventListener('click', () => {
                const currentIndex = items.findIndex((entry, entryIndex) =>
                    String(entry.key ?? entryIndex) === row.dataset.key);
                if (currentIndex < 0) return;
                setSelected(currentIndex);
                selectCurrent();
            });

            return row;
        }

        function updateItemRow(row, item, index) {
            row.dataset.key = String(item.key ?? index);
            row.dataset.value = String(item.value ?? '');
            row.querySelector('.item-label').textContent = item.label || '';
            row.querySelector('.item-description').textContent = item.description || '';
        }

        function renderItems(notify = true) {
            menuItems.innerHTML = '';

            if (!items.length) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = window.emptyText || 'No furniture available.';
                menuItems.appendChild(empty);
                return;
            }

            selectedIndex = Math.max(0, Math.min(selectedIndex, items.length - 1));

            items.forEach((item, index) => {
                const row = createItemRow(item, index);
                updateItemRow(row, item, index);
                menuItems.appendChild(row);
            });

            refreshSelection(notify);
        }

        function setSelected(index) {
            if (!items.length || index === selectedIndex) return;
            selectedIndex = (index + items.length) % items.length;
            refreshSelection();
        }

        function moveSelection(direction) {
            if (!items.length) return;
            selectedIndex = (selectedIndex + direction + items.length) % items.length;
            refreshSelection();
        }

        function applyLiveItems(data, forceReorder = false) {
            if (mode !== 'decoration') return;

            const nextItems = Array.isArray(data.items) ? data.items : [];

            if (listReorderPaused && !forceReorder) {
                const rows = new Map(
                    Array.from(menuItems.querySelectorAll('.menu-item'))
                        .map(row => [row.dataset.key, row])
                );

                nextItems.forEach((item, index) => {
                    const row = rows.get(String(item.key ?? index));
                    if (row) updateItemRow(row, item, index);
                });

                pendingLiveItems = data;
                return;
            }

            const selectedKey = items[selectedIndex]
                ? String(items[selectedIndex].key)
                : null;
            const existingRows = new Map(
                Array.from(menuItems.querySelectorAll('.menu-item'))
                    .map(row => [row.dataset.key, row])
            );
            const activeKeys = new Set();

            items = nextItems;
            menuItems.querySelectorAll('.empty').forEach(row => row.remove());

            items.forEach((item, index) => {
                const key = String(item.key ?? index);
                let row = existingRows.get(key);

                if (!row) row = createItemRow(item, index);
                updateItemRow(row, item, index);
                menuItems.appendChild(row);
                activeKeys.add(key);
            });

            existingRows.forEach((row, key) => {
                if (!activeKeys.has(key)) row.remove();
            });

            if (!items.length) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = window.emptyText || 'No furniture available.';
                menuItems.appendChild(empty);
                selectedIndex = 0;
                return;
            }

            const matchingIndex = selectedKey === null
                ? -1
                : items.findIndex(item => String(item.key) === selectedKey);
            selectedIndex = matchingIndex >= 0
                ? matchingIndex
                : Math.max(0, Math.min(selectedIndex, items.length - 1));

            refreshSelection(false);
            notifySelection();
        }

        function selectCurrent() {
            if (!items.length) return;
            if (mode === 'decoration') {
                post('decorationSelect', { index: selectedIndex + 1 });
            } else if (mode === 'housing-menu' || mode === 'housing-sell') {
                post('housingSelect', { value: items[selectedIndex].value });
            }
        }

        function renderHousingLedger(data) {
            const labels = data.labels || {};
            const property = data.property || {};
            const stats = [
                [labels.house || 'House #', property.house],
                [labels.taxAmount || 'Tax Amount', money(property.taxAmount)],
                [labels.taxRate || 'Tax Rate', property.taxRate],
                [labels.taxDueDate || 'Tax Due Date', property.taxDueDate],
                [labels.taxFunds || 'Tax Funds', money(property.taxFunds),
                    property.taxAtRisk ? 'danger' : ''],
                [labels.taxFunded || 'Tax Funded For', property.taxFunded],
                [labels.normalFunds || 'Ledger Balance', money(property.normalFunds)]
            ];

            propertyInformation.innerHTML = '';
            stats.forEach(([label, value, className = '']) => {
                const stat = document.createElement('div');
                stat.className = `property-stat ${className}`.trim();
                const statLabel = document.createElement('div');
                statLabel.className = 'stat-label';
                statLabel.textContent = label;
                const statValue = document.createElement('div');
                statValue.className = 'stat-value';
                statValue.textContent = value ?? '';
                stat.append(statLabel, statValue);
                propertyInformation.appendChild(stat);
            });

            const deposit = document.getElementById('ledgerDepositButton');
            const withdraw = document.getElementById('ledgerWithdrawButton');
            const payTax = document.getElementById('ledgerPayTaxButton');
            deposit.textContent = labels.deposit || 'Deposit';
            withdraw.textContent = labels.withdraw || 'Withdraw';
            payTax.textContent = labels.payTax || 'Pay Tax';
            payTax.disabled = property.taxEnabled === false;
            deposit.onclick = () => post('housingLedgerAction', { action: 'DEPOSIT' });
            withdraw.onclick = () => post('housingLedgerAction', { action: 'WITHDRAW' });
            payTax.onclick = () => post('housingLedgerAction', { action: 'PAY_TAX' });
        }

        function accountLabel(value) {
            return String(value || 'bank')
                .replace(/[_-]+/g, ' ')
                .replace(/\b\w/g, character => character.toUpperCase());
        }

        function renderHousingSell(data) {
            const labels = data.labels || {};
            const sale = data.sale || {};
            const inventoryKnown = typeof sale.inventoryHasItems === 'boolean';
            const inventoryHasItems = sale.inventoryHasItems === true;

            sellInformation.innerHTML = '';
            const appendStat = (label, value, className = '') => {
                const row = document.createElement('div');
                row.className = `property-stat ${className}`.trim();
                const rowLabel = document.createElement('div');
                rowLabel.className = 'stat-label';
                rowLabel.textContent = label;
                const rowValue = document.createElement('div');
                rowValue.className = 'stat-value';
                rowValue.textContent = value ?? '';
                row.append(rowLabel, rowValue);
                sellInformation.appendChild(row);
            };

            appendStat(labels.house || 'House #', sale.house);
            appendStat(labels.ledger || 'Money in Ledger', money(sale.ledger));

            const refundNote = document.createElement('div');
            refundNote.className = 'sale-note';
            refundNote.textContent = (labels.refundNote || 'Ledger funds will be deposited into your %s account.')
                .replace('%s', accountLabel(sale.refundAccount));
            sellInformation.appendChild(refundNote);

            appendStat(labels.taxLedger || 'Unused Tax Money', money(sale.taxLedger));

            const taxRefundNote = document.createElement('div');
            taxRefundNote.className = 'sale-note';
            taxRefundNote.textContent = (labels.taxRefundNote || 'Unused tax money will be deposited into your %s account.')
                .replace('%s', accountLabel(sale.refundAccount));
            sellInformation.appendChild(taxRefundNote);

            appendStat(
                labels.inventory || 'House Inventory',
                inventoryKnown
                    ? (inventoryHasItems ? (labels.inventoryHasItems || 'Has Items') : (labels.inventoryEmpty || 'Empty'))
                    : (labels.inventoryUnknown || 'Unable to Check'),
                inventoryHasItems || !inventoryKnown ? 'danger' : ''
            );

            if (inventoryHasItems) {
                const warning = document.createElement('div');
                warning.className = 'sale-note danger';
                warning.textContent = labels.inventoryWarning
                    || 'Inventory will not be transferred when the house is sold.';
                sellInformation.appendChild(warning);
            }

            decorationView.classList.add('sell-confirm');
            sellInformation.style.display = 'block';
        }

        function renderPaymentLines(stats) {
            paymentInformation.innerHTML = '';
            stats.forEach(([label, value]) => {
                const row = document.createElement('div');
                row.className = 'property-stat';
                const rowLabel = document.createElement('div');
                rowLabel.className = 'stat-label';
                rowLabel.textContent = label;
                const rowValue = document.createElement('div');
                rowValue.className = 'stat-value';
                rowValue.textContent = value;
                row.append(rowLabel, rowValue);
                paymentInformation.appendChild(row);
            });
        }

        function renderHousingPayment(data) {
            const labels = data.labels || {};
            const normalEntry = document.getElementById('normalAmountEntry');
            const taxStepper = document.getElementById('taxAmountStepper');
            const amountLabel = document.getElementById('paymentAmountLabel');
            const submit = document.getElementById('paymentSubmitButton');

            if (data.view === 'transfer') {
                const transfer = data.transfer || {};
                const transferPlayers = Array.isArray(transfer.players) ? transfer.players : [];
                paymentInformation.innerHTML = '';

                const heading = document.createElement('div');
                heading.className = 'keyholder-section-title';
                const headingLabel = document.createElement('span');
                headingLabel.textContent = labels.nearbyPlayers || 'Players On Property';
                const headingCount = document.createElement('span');
                headingCount.textContent = String(transferPlayers.length);
                heading.append(headingLabel, headingCount);
                paymentInformation.appendChild(heading);

                if (!transferPlayers.length) {
                    const empty = document.createElement('div');
                    empty.className = 'section-empty';
                    empty.textContent = transfer.loading
                        ? 'Finding players on the property...'
                        : 'No other players are on the property';
                    paymentInformation.appendChild(empty);
                } else {
                    transferPlayers.forEach(player => {
                        const row = document.createElement('div');
                        row.className = 'person-row';
                        const main = document.createElement('div');
                        main.className = 'person-main';
                        const name = document.createElement('div');
                        name.className = 'person-name';
                        name.textContent = player.name || 'Unknown Player';
                        const id = document.createElement('div');
                        id.className = 'person-id';
                        id.textContent = `Server ID: ${player.serverId}`;
                        main.append(name, id);
                        row.appendChild(main);
                        row.onclick = () => {
                            document.getElementById('ledgerAmountInput').value = player.serverId;
                        };
                        paymentInformation.appendChild(row);
                    });
                }
                normalEntry.style.display = 'block';
                taxStepper.style.display = 'none';
                amountLabel.textContent = labels.amount || 'Player Server ID';
                submit.textContent = labels.submit || 'Transfer Property';
                submit.disabled = false;

                const input = document.getElementById('ledgerAmountInput');
                input.value = '';
                input.min = '1';
                input.step = '1';
                input.removeAttribute('max');
                submit.onclick = () => post('housingSubmitTransfer', {
                    serverId: Number(input.value)
                });
                window.setTimeout(() => input.focus(), 0);
                return;
            }

            if (data.view === 'ledger_transaction') {
                const transaction = data.transaction || {};
                renderPaymentLines([
                    [labels.currentAmount || 'Current Amount', money(transaction.currentAmount)],
                    [labels.playerFunds || 'Player Cash', money(transaction.playerFunds)]
                ]);
                normalEntry.style.display = 'block';
                taxStepper.style.display = 'none';
                amountLabel.textContent = labels.amount || 'Amount';
                submit.textContent = labels.submit || transaction.action;
                submit.disabled = false;

                const input = document.getElementById('ledgerAmountInput');
                input.value = '';
                input.max = String(Math.max(0, Number(transaction.maximum || 0)));
                submit.onclick = () => post('housingSubmitLedgerTransaction', {
                    action: transaction.action,
                    amount: Number(input.value)
                });
                window.setTimeout(() => input.focus(), 0);
                return;
            }

            const tax = data.taxPayment || {};
            renderPaymentLines([
                [labels.taxAmount || 'Tax Amount', money(tax.taxAmount)],
                [labels.taxRate || 'Tax Rate', tax.taxRate || '0%'],
                [labels.taxDueDate || 'Tax Due Date', tax.taxDueDate || 'Not scheduled'],
                [labels.currentFunds || 'Current Tax Funds', money(tax.currentFunds)],
                [labels.playerFunds || 'Player Cash', money(tax.playerFunds)]
            ]);
            normalEntry.style.display = 'none';
            taxStepper.style.display = 'grid';
            amountLabel.textContent = labels.amount || 'Tax Payment';
            submit.textContent = labels.submit || 'Deposit Tax';

            const increment = Math.max(0, Number(tax.taxAmount || 0));
            const available = Math.max(0, Number(tax.playerFunds || 0));
            const selected = document.getElementById('taxSelectedAmount');
            const minus = document.getElementById('taxAmountMinus');
            const plus = document.getElementById('taxAmountPlus');

            taxPaymentAmount = 0;
            const updateSelected = () => {
                selected.textContent = money(taxPaymentAmount);
                minus.disabled = taxPaymentAmount <= 0;
                plus.disabled = increment <= 0 || taxPaymentAmount + increment > available;
                submit.disabled = taxPaymentAmount <= 0;
            };
            minus.onclick = () => {
                taxPaymentAmount = Math.max(0, taxPaymentAmount - increment);
                updateSelected();
            };
            plus.onclick = () => {
                if (increment > 0 && taxPaymentAmount + increment <= available) {
                    taxPaymentAmount += increment;
                    updateSelected();
                }
            };
            submit.onclick = () => post('housingSubmitTaxPayment', { amount: taxPaymentAmount });
            updateSelected();
        }

        function appendPeopleSection(title, people, action) {
            const heading = document.createElement('div');
            heading.className = 'keyholder-section-title';
            const headingText = document.createElement('span');
            headingText.textContent = title;
            const count = document.createElement('span');
            count.textContent = String(people.length);
            heading.append(headingText, count);
            keyholderLists.appendChild(heading);

            if (!people.length) {
                const empty = document.createElement('div');
                empty.className = 'section-empty';
                empty.textContent = action === 'remove'
                    ? 'No key holders'
                    : 'No nearby non-key holders';
                keyholderLists.appendChild(empty);
                return;
            }

            people.forEach(person => {
                const row = document.createElement('div');
                row.className = 'person-row';
                const main = document.createElement('div');
                main.className = 'person-main';
                const name = document.createElement('div');
                name.className = 'person-name';
                name.textContent = person.name || 'Unknown Player';
                const id = document.createElement('div');
                id.className = 'person-id';
                id.textContent = action === 'remove'
                    ? `Citizen ID: ${person.id || person.citizenid || 'Unknown'}`
                    : `Server ID: ${person.serverId}`;
                main.append(name, id);

                if (action === 'remove') {
                    main.onclick = () => post('housingKeyholderAction', {
                        action: 'permissions',
                        citizenid: person.citizenid,
                        name: person.name
                    });
                }

                const button = document.createElement('button');
                button.className = `person-action ${action === 'remove' ? 'remove' : 'add'}`;
                button.textContent = action === 'remove' ? '−' : '+';
                button.title = action === 'remove' ? 'Remove key holder' : 'Add key holder';
                button.onclick = event => {
                    event.stopPropagation();
                    post('housingKeyholderAction', action === 'remove' ? {
                        action,
                        citizenid: person.citizenid,
                        name: person.name
                    } : {
                        action,
                        serverId: person.serverId
                    });
                };
                row.append(main, button);
                keyholderLists.appendChild(row);
            });
        }

        function renderHousingKeyholders(data) {
            keyholderLists.innerHTML = '';
            appendPeopleSection(
                `Key Holders (${(data.keyholders || []).length}/${data.maxKeyholders || 0})`,
                data.keyholders || [],
                'remove'
            );
            appendPeopleSection('Non Key Holders · Nearby', data.nonKeyholders || [], 'add');
        }

        speed.addEventListener('input', () => {
            speedVal.textContent = Number(speed.value).toFixed(2);
        });

        window.addEventListener('mousedown', event => {
            if (panel.style.display !== 'block') return;

            if (event.button === 0 && mode === 'decoration') {
                listReorderPaused = true;
                window.clearTimeout(listReorderTimer);
                return;
            }

            if (event.button === 2 && (mode === 'decoration' || mode === 'placement')) {
                event.preventDefault();
                post('cameraDragStart');
            }
        }, true);

        window.addEventListener('mouseup', event => {
            if (event.button !== 0 || !listReorderPaused) return;

            window.clearTimeout(listReorderTimer);
            listReorderTimer = window.setTimeout(() => {
                listReorderPaused = false;

                if (pendingLiveItems) {
                    const pending = pendingLiveItems;
                    pendingLiveItems = null;
                    applyLiveItems(pending, true);
                }
            }, 75);
        }, true);

        window.addEventListener('contextmenu', event => event.preventDefault());

        window.addEventListener('keydown', event => {
            if (panel.style.display !== 'block') return;

            if (mode === 'housing-payment' && event.target.tagName === 'INPUT'
                && (event.key === 'Backspace' || event.key === 'ArrowLeft' || event.key === 'ArrowRight')) {
                return;
            }

            if (mode === 'decoration' || mode === 'housing-menu') {
                if (event.key === 'ArrowUp') {
                    event.preventDefault();
                    moveSelection(-1);
                } else if (event.key === 'ArrowDown') {
                    event.preventDefault();
                    moveSelection(1);
                } else if (event.key === 'Enter') {
                    event.preventDefault();
                    selectCurrent();
                } else if (event.key === 'Backspace') {
                    event.preventDefault();
                    post(mode === 'decoration' ? 'decorationBack' : 'housingBack');
                } else if (event.key === 'Escape') {
                    event.preventDefault();
                    post(mode === 'decoration' ? 'decorationClose' : 'housingClose');
                }
            } else if (mode === 'housing-ledger' || mode === 'housing-payment' || mode === 'housing-keyholders') {
                if (mode === 'housing-payment' && event.key === 'Enter') {
                    event.preventDefault();
                    document.getElementById('paymentSubmitButton').click();
                } else if (event.key === 'Backspace') {
                    event.preventDefault();
                    post('housingBack');
                } else if (event.key === 'Escape') {
                    event.preventDefault();
                    post('housingClose');
                }
            } else if (mode === 'housing-sell') {
                if (event.key === 'Escape') {
                    event.preventDefault();
                    post('housingClose');
                }
            } else if (mode === 'placement' && event.key === 'Escape') {
                event.preventDefault();
                sendPlacement('cancel');
            }
        });

        window.addEventListener('message', event => {
            const data = event.data || {};

            if (data.action === 'close' || data.show === false) {
                listReorderPaused = false;
                pendingLiveItems = null;
                window.clearTimeout(listReorderTimer);
                panel.style.display = 'none';
                hideViews();
                mode = null;
                return;
            }

            if (data.action === 'housing') {
                listReorderPaused = false;
                pendingLiveItems = null;
                window.clearTimeout(listReorderTimer);
                document.getElementById('title').textContent = data.title || 'Property Management';
                document.getElementById('subtitle').textContent = data.subtitle || '';
                panel.style.display = 'block';
                hideViews();

                if (data.view === 'ledger') {
                    mode = 'housing-ledger';
                    housingLedgerView.style.display = 'flex';
                    renderHousingLedger(data);
                } else if (data.view === 'ledger_transaction' || data.view === 'tax_payment'
                    || data.view === 'transfer') {
                    mode = 'housing-payment';
                    housingPaymentView.style.display = 'flex';
                    renderHousingPayment(data);
                } else if (data.view === 'keyholders') {
                    mode = 'housing-keyholders';
                    housingKeyholdersView.style.display = 'flex';
                    renderHousingKeyholders(data);
                } else {
                    mode = data.view === 'sell_confirm' ? 'housing-sell' : 'housing-menu';
                    items = Array.isArray(data.items) ? data.items : [];
                    selectedIndex = 0;
                    window.emptyText = data.emptyText || 'No options available.';
                    decorationView.style.display = 'flex';
                    if (data.view === 'sell_confirm') {
                        menuKeyHelp.textContent = 'Mouse click required to confirm or go back   •   Esc Exit';
                        renderHousingSell(data);
                    } else {
                        menuKeyHelp.textContent = '↑ ↓ Navigate   Enter Select   Backspace Back   Esc Exit';
                    }
                    renderItems(false);
                }
                return;
            }

            if (data.action === 'decoration') {
                listReorderPaused = false;
                pendingLiveItems = null;
                window.clearTimeout(listReorderTimer);
                mode = 'decoration';
                items = Array.isArray(data.items) ? data.items : [];
                selectedIndex = 0;
                window.emptyText = data.emptyText;
                document.getElementById('title').textContent = data.title || 'Decoration Menu';
                document.getElementById('subtitle').textContent = data.subtitle || '';
                menuKeyHelp.textContent = '↑ ↓ Navigate   Enter Select   Backspace Back   Esc Exit';
                panel.style.display = 'block';
                hideViews();
                decorationView.style.display = 'flex';
                renderItems();
                return;
            }

            if (data.action === 'decorationItems' && mode === 'decoration') {
                applyLiveItems(data);
                return;
            }

            if (data.action === 'placement' || data.show === true) {
                listReorderPaused = false;
                pendingLiveItems = null;
                window.clearTimeout(listReorderTimer);
                mode = 'placement';
                items = [];
                const lang = data.lang || {};
                document.getElementById('title').textContent = lang.title || 'Furniture Placement';
                document.getElementById('subtitle').textContent = 'Position and confirm your furniture';
                document.getElementById('speedLabel').textContent = lang.speed || 'Speed';
                document.getElementById('positionGroupLabel').textContent = lang.positionGroup || 'Position';
                document.getElementById('elevationGroupLabel').textContent = lang.elevationGroup || 'Elevation';
                document.getElementById('rotationGroupLabel').textContent = lang.rotationGroup || 'Rotation';
                document.getElementById('forwardLabel').textContent = lang.forward || 'Forward';
                document.getElementById('backwardLabel').textContent = lang.backward || 'Backward';
                document.getElementById('leftLabel').textContent = lang.left || 'Left';
                document.getElementById('rightLabel').textContent = lang.right || 'Right';
                document.getElementById('upLabel').textContent = lang.up || 'Up';
                document.getElementById('downLabel').textContent = lang.down || 'Down';
                document.getElementById('rotPlusLabel').textContent = lang.rotPlus || 'Rotate +';
                document.getElementById('rotMinusLabel').textContent = lang.rotMinus || 'Rotate -';
                document.getElementById('confirmLabel').textContent = lang.confirm || 'Confirm';
                document.getElementById('cancelLabel').textContent = lang.cancel || 'Cancel';
                panel.style.display = 'block';
                hideViews();
                placementView.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
